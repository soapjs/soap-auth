name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Node 24.17.0
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.17.0
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Check Package
        run: npm pack --dry-run

      - name: Audit Runtime Dependencies
        run: npm audit --omit=dev
